syntax = "proto3";

enum Gender {
    MALE = 0;
    FEMALE = 1;
    UNSPECIFIED = 2;
}

message Address {
    string street = 1;
    uint32 building = 2;
}

message Person {
    string name = 1;
    int32 birth_year = 2;
    Address address = 3;
    repeated string phone_numbers = 4;
    Gender gender = 5;
} 